title: Hacker-Blog
description: "A Jekyll Blog Theme For Hackers"
author:
  name: "SomeHacker"
  email: "someone@somewebsite.somedomain"
  url: "https://ashishchaudhary.in/hacker-blog"

baseurl: /

source: .
destination: ./_site
permalink: /:title
twitter_username: paulatennent
github_username:  paulatennent

paginate: 3
paginate_path: /page/:num/

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

owner : "paula tennent"
year : "2021"

future: true

# Build settings

plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-sitemap

#  - jekyll-paginate

