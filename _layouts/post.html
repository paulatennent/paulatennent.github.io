---
layout: default
---

<article>
  <h2>{{ page.title }}</h2>
  <time datetime="{{ page.date | date_to_xmlschema }}" class="by-line">{{ page.date | date_to_string }}</time>
  {{ content }}
  <script src="https://utteranc.es/client.js"
        repo="paulatennent/blog2"
        issue-term="pathname"
        theme="github-dark"
        crossorigin="anonymous"
        async>
  </script>
</article>
